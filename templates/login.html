<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Login — HamzaShop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f1117;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:
    radial-gradient(circle at 20% 50%,rgba(108,99,255,.15) 0%,transparent 60%),
    radial-gradient(circle at 80% 20%,rgba(247,37,133,.12) 0%,transparent 50%);
}
.login-box{
  background:#1e2535;border:1px solid #2a3347;border-radius:16px;
  padding:42px 40px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:64px;height:64px;border-radius:16px;margin:0 auto 12px;
  background:linear-gradient(135deg,#6c63ff,#f72585);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem}
.logo h1{font-size:1.5rem;font-weight:700;color:#e2e8f0}
.logo p{font-size:.82rem;color:#8892a4;margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:.82rem;color:#8892a4;margin-bottom:7px;font-weight:500}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#8892a4;font-size:.9rem}
.form-control{
  width:100%;background:#252d3d;border:1px solid #2a3347;
  color:#e2e8f0;padding:11px 14px 11px 40px;border-radius:9px;font-size:.875rem;transition:.2s
}
.form-control:focus{outline:none;border-color:#6c63ff;box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.btn-login{
  width:100%;padding:12px;background:linear-gradient(135deg,#6c63ff,#f72585);
  color:#fff;border:none;border-radius:9px;font-size:.95rem;font-weight:600;
  cursor:pointer;transition:.2s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.error{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);
  color:#e74c3c;padding:10px 14px;border-radius:8px;font-size:.83rem;margin-bottom:18px;
  display:flex;align-items:center;gap:8px}
.footer-note{text-align:center;margin-top:24px;font-size:.75rem;color:#8892a4}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">🛍️</div>
    <h1>HamzaShop Admin</h1>
    <p>Sign in to manage your store</p>
  </div>
  {% if error %}
  <div class="error"><i class="fa-solid fa-triangle-exclamation"></i>{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input name="username" class="form-control" placeholder="admin" required autocomplete="username"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input name="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>
  </form>
  <p class="footer-note">Protected Admin Area • HamzaShop © 2024</p>
</div>
</body>
</html>
